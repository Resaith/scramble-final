<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scramble Generator</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      user-select: none;
    }

    #scramble {
      font-size: 26px;
      text-align: center;
      max-width: 90%;
      line-height: 1.5;
      cursor: pointer;
    }

    .hint {
      opacity: 0.6;
      font-size: 14px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div id="scramble">Toca o presiona cualquier tecla</div>
  <div class="hint">Scramble Generator - Rubik</div>

  <script>
    const moves = ["R","R'","R2","L","L'","L2","U","U'","U2","D","D'","D2","F","F'","F2","B","B'","B2"];

    function randomScramble(length = 20) {
      let scramble = [];
      let lastAxis = "";

      const axis = {
        R: "RL", L: "RL",
        U: "UD", D: "UD",
        F: "FB", B: "FB"
      };

      while (scramble.length < length) {
        let move = moves[Math.floor(Math.random() * moves.length)];
        let face = move[0];

        if (axis[face] === lastAxis) continue;

        scramble.push(move);
        lastAxis = axis[face];
      }

      return scramble.join(" ");
    }

    function newScramble() {
      document.getElementById("scramble").innerText = randomScramble(20);
    }

    // evita spam rápido
    let canGenerate = true;

    function triggerScramble() {
      if (!canGenerate) return;

      canGenerate = false;
      newScramble();

      setTimeout(() => {
        canGenerate = true;
      }, 150);
    }

    // ⌨️ teclado (cualquier tecla)
    document.addEventListener("keydown", triggerScramble);

    // 📱 toque en pantalla
    document.addEventListener("touchstart", (e) => {
      e.preventDefault();
      triggerScramble();
    });

    // 🖱️ clic en PC
    document.addEventListener("click", triggerScramble);

  </script>

</body>
</html>
